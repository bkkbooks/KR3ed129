front:
  text: 海上仙方序余家世南京高祖因宦遊寄跡四明所謂醫書奧旨初得醫師王承宣心傳之妙更歷三世至先君制干隨侍魏丞相入都城遂以儒醫名於時余讀父書密受奧旨自淳熙改元始續先業遍遊京邑才七八年因已出入士大夫之門而朝野以是草木知己逮今四十餘載備見先輩後輩初學末學興廢不一蓋由用藥治病僥幸於目前故福善禍淫報應於身後籲可憫也餘日迫桑榆之景心棄利名隱居求志恨無以惠人輒取五世家傳名方並生平行醫應效圓散與夫古今聖賢諸方歷學請問四方名士海上良法集為一冊計詩七十七首的有起死還生之效活人以代耕設或私藏則所濟者狹矣謹録施以傳非惟世人有疾者一展卷而識之得此者亦可以自助豈曰小補之哉保義郎差充殿前司提點諸班醫藥飯食兼和劑局監收買藥材官溫大明謹序
