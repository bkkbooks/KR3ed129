body:
  text: 新刻溫隱居海上仙方前集第一證中風氣逆有痰涎蘇合姜調灌下咽次用省風兼續命多增木麝二香煎往往中風之證多因喜怒不常或飲食停滯或怒氣傷神思慮過多損於心臟用局方蘇合香丸三粒生薑自然汁化開灌下咽喉次用局方省風湯小續命湯各加麝香木香依法煎服第二證瘡毒年深變癩風眼圓鼻陷遍身紅風油惡使烏沉和兩月調停有大功切詳大風或年深瘡疾或鼻梁崩倒頭面生瘡不能已者局方烏沉湯五貼真大風油一兩半用微火化大風油成汁和烏沉湯又用麥麵糊為丸如梧桐子大每服三十丸至四十丸食後茶清吞下空心臨睡服之一月二月必見神效第三證中寒中氣厥而僵朮附加煎蘇合香惟有老人多氣弱須吞養正助元陽中寒中氣之候四肢厥逆口噤牙關緊急痰涎壅盛如中風狀者用局方朮附湯一貼生薑二十片水二盞煎八分去滓後調蘇合香丸二粒並進二服或氣短頭暈手足厥逆未遠者可送養正丹五十粒至百粒奇效必愈第四證風中須將氣飲詳姜調蘇合橘皮湯省風續命徐徐進二藥仍須入木香往往中風之證多因心腎虧虛喜怒不常或服食停飲或怒氣傷神過慮損心之所致也先用局方蘇合香丸薑汁調數丸分為三服卻用陳皮湯點服之次服省風湯小續命湯那木香依法煎服之第五證口眼喎斜是中風筋痛煩熱遍身中急煎五七加芍藥蘇合香丸速有功風寒濕氣留滯經絡忽然手足頑麻口眼喎斜項強筋疼遍身煩熱未可便用風藥宜煎局方三五七散加芍藥三錢用水三盞生薑十片煎取一盞半去滓作三次調蘇合香丸三粒服餌留滓再煎第六證肺風赤鼻最難醫我有良方付與之但用硫礬為細末調塗茄汁甚為奇肺風赤鼻者乃是酒渣之病也其病最難治療但用硫黃白礬二味等分為末用水茄子汁調塗鼻上如無水茄子汁將水茄子焙乾為末同煎藥用水調塗患處第七證老病之人腳無力補虛滋養能何益不如朮附木瓜香送下震靈有功績治老少久病弱人行步乏力筋寒骨痛冷疼者可用朮附湯二貼木瓜木香一塊用刀銼碎用水三盞生薑二十片煎取一盞半去滓分二次下震靈丹五丸至十丸食前服之如腳重疼者又加白芍藥二條約二寸銼碎同煎為妙第八證老人心腎俱不足下部痿衰陽氣促黑錫丹交定志丸卻將附益煎湯服老人心腎虧虛膀胱既寒下部痿弱用局方黑錫丹三百粒定志丸二百粒同研為末再用糯米糊為丸如梧桐子大陰乾每用附子半隻炮去皮尖分作二服每用益智二十粒入鹽少許同煎取八分去滓送下前藥三十丸加至四十丸服之甚妙第九證背肩手足痛如捶濕在脾經故若斯四物湯加烏沉木更兼蓬朮最為奇脾經受濕令人走注疼痛肩背手足俱疼局方四物湯一貼加蓬朮二塊如錢大捶碎木香烏藥沉香各一錢細銼用水三大盞生薑十片同煎取一盞二分去滓分作二服留滓再煎亦作二服如藥味苦澀加甘草二寸銼同煎為妙第十證喘滿生痰治療難諸醫用藥未能痊須將滑石同半夏皂子生薑立便安切詳喘滿皆因肺氣不利氣道上逆令人喘滿不安膈脘生痰可用滑石半夏片各一兩同為細末每服三錢水二盞入皂莢子三個銼作六段入生薑十五片煎至八分去滓入蜜少許再煎令化服之第十一證積年痰飲漸成風口眼喎斜語不通蘇合香涎調半盞青州丸子有神功久年痰飲停滯胸膈忽然痰涎壅盛手足頭體口眼喎斜言語不正用局方麝香蘇合香丸三粒用生薑汁調開送下局方青州白丸子五十丸如不能吞將丸子乳細灌下為妙第十二證腦寒頭痛有風痰晝夜呻吟不得安白芷太陽同碾末水調貼上勝靈丹腦寒之病皆因風邪攻於上焦令人頭疼晝夜引痛不能安寧用局方太陽丹一貼加香白芷末半兩用水調塗患處第十三證痰飲氣𡇼及結胸頑涎停滯不能通銀硃礬石熔為劑薑汁調咽大有功飲結氣結結胸皆因邪痰停積胸滿氣噎方用銀硃白礬二味等分熔化作劑每服一丸如彈大用生薑自然汁化下第十四證勞心膽冷夜無眠棗柏仁加定志丸研和再為梧子顆更加朱乳甚相安勞心膽冷之病夜臥不能閣眼者每用局方定志丸一貼次用酸棗仁半錢炒去殼用仁又用柏子仁半錢亦炒熟二味為末和定志丸如梧桐子大硃砂乳香為衣每服五十丸用棗湯送下不以時候第十五證胸滿生痰要早看克教咳嗽肺傷殘白礬半夏加罌殼薑汁為糊可作丸風痰邪痰令人胸膈痞滿噎塞不通方用半夏白礬粟殼三味等為細末用生薑自然汁打糊為丸如梧桐子大每服三十丸薑湯送下食後臨睡服之第十六證白濁遺精最損人茯苓益智煮烏沉生薑一片水一盞煎服何憂歲月深白濁之病皆因心氣不足之所致也每用局方烏沉湯一貼益智二十枚茯苓一錢水二大盞生薑五片煎八分去滓空心食前日進二服第十七證心腎虛成消渴患水漿晝夜渾無算連膠八味和為丸數服須教減一半消渴之病皆因腎氣虛弱又因少年服乳石過度其病大渴引飲方用黃連阿膠丸一貼乳為末八味丸二貼合和為丸如梧桐子大每服三十丸至四十丸煎蓮肉北棗粟殼陳木各二錢重用水一大碗煎至七分碗去滓分作四五服送下前合丸子若病久胃虛飲食減少更加陳皮二片砂仁二十粒捶碎同煎取滓再煎尤妙第十八證腹脹脾疼怎抵當椒姜之外有丁香三般等分羅教細次入些鹽點白湯脾疼之病皆因寒氣停滯積於胸膈或時嘔吐酸水不思飲食用胡椒良薑丁香三味等分為細末每服一大錢二錢入鹽少許白湯點服不拘時候第十九證濕氣周遊腿腳疼香蘇飲煮鷺鷀藤木香芍藥仍增入功效如神不可言且如濕氣之證腿腳痠疼足面赤腫步履不能用局方香蘇飲一貼加鷺鷀藤木香赤芍藥各二錢用水四盞入生薑十片煎至二盞去滓分為四服食前二服食後二服其效如神第二十證多年腳氣不曾安膝痛筋寒步履難朮附宣瓜同南木煎湯送下石南丸久年腳氣或年老膝疼不能行步者可用局方朮附湯倍用附子加南木香一錢水三盞生薑五片宣木瓜三片煎取一盞二分去滓送下局方石南丸五十粒數服立愈或元氣弱者煎前飲子送下震靈丹十粒為妙第二十一證脾黃腹脹服連翹酒食紅圓始可消並煮香蘇來送下更加草果自和調如患食積酒積胸滿刺痛脾疼可食者煎局方香蘇飲一貼加草果二個灰火炮細銼用水三盞生薑十片同煎取一盞半分為三次送下紅丸子數服或腹脹脾黃可食中滿噁心用前項飲子送下連翹丸尤妙第二十二證脾疼腹脹惱心腸痞悶多因食氣傷快取縮砂三和散煎湯調下理中湯久患腹脹脾疼中滿痞悶可食大小便或澀小腹脹急可用局方三和散二貼縮砂仁二十粒捶碎用水三大盞生薑十片燈心十莖同煎取一盞去渣分為三次每用煎藥調理中湯末半貼立效第二十三證腹痛多因脾積干元來大小便艱難治中加縮吞神保諸證無憂立見安腹痛之病皆因寒氣停積連旬不已大便虛澀小便赤急痛者用局方治中湯加縮砂仁二十顆捶碎水二大盞生薑十片同煎取八分去渣分作二服先用四分盞送下局方神保丸十粒少頃更量病人虛實加減神保丸服之立愈第二十四證脾腎俱虛寒氣堅胸間腹下痛相連多因食飽傷飢得須用烏沉送正丸脾腎氣虛臍腹下疼或胸膈滿悶用局方小烏沉湯一貼秀王府正元丹一貼次用烏沉湯半貼卻用鹽湯點烏沉湯送下正元丹五十粒如心胸痛者嚼胡椒十粒同服甚妙第二十五證多時瀉痢腹中寒晝夜應須數十番但把縮砂並粟米煎湯送下駐車丸連月腹痛瀉痢頻並不能安跡或病後肚疼泄痢不止可用局方駐車丸一貼分作二服煎捶碎縮砂二十粒粟米約二百粒陳皮一片生薑十片北棗二個水三盞同煎取一盞半分作二服送下駐車丸五十粒如病不頗深連進數服其效必愈不必盡述第二十六證久痢腸虛腹痛時局方有藥可修治縮砂陳米陳皮煮一盞湯調赤石脂下痢之病皆因腸胃虛弱或時腹痛用局方赤石脂湯二貼分三服煎縮砂二十粒捶碎陳皮一大片陳米百餘粒生薑十片大棗二枚水二大盞煎取一盞半去滓分作三次調赤石脂湯立效第二十七證喘嗽何憂遠近年橘皮半夏紫蘇煎更加罌粟七枚殼氣急痰涎日下痊凡喘嗽之病皆因肺感寒邪氣道不利上迫喘嗽或時喘急可用局方橘皮半夏湯一貼加罌粟殼七個製法依四味湯方水二盞生薑十片烏梅一個同煎取八分去滓臨臥服第二十八證老人病喘治尤難半夏湯吞養正丹更用紫蘇並粟殼服時須把重輕言如老人及宿病喘滿氣道不通痰涎壅盛者可用局方橘皮半夏湯一貼加赤茯苓一錢水二盞生薑十片烏梅一隻紫蘇二葉同煎至八分去渣一服分作二次送下養正丹五十粒連進二三服又方甚者煎前方半夏湯加罌粟殼煎湯送下養正丹妙第二十九證感風感冷思昏沉寒熱痠疼力不禁半夏薑茶煎五積渾身清健值千金風寒傷於形體令人頭目不爽寒熱俱發百節痠疼可用局方五積散一貼半夏曲一塊如錢大捶碎生薑一大片水一盞半煎至八分去滓溫服頭痛甚者臨時入江茶少許或小便亦加燈心十莖烏梅二個煎第三十證傷風微嗽聲還重發熱頭疼身又痛白芷薑汁調消風或塗或服雙行用傷風之病令人頭疼聲重發熱微嗽可用局方消風散一貼分為二服用香白芷二塊煎湯調服如頭疼發熱用薑汁一蛤殼調消風散卻用白湯八分盞點服之如頭疼甚者用薑汁調消風散成膏子塗兩太陽尤妙第三十一證身疼體倦感寒邪口渴頭昏熱更加面赤須煎和解散仍添赤芍病須瘥感寒發熱頭痛體痛者可用局方和解散一貼加赤芍藥二錢水三盞生薑五片烏梅二個煎取一盞半去滓作二次服之如頭疼甚者臨時入江茶少許服之第三十二證月候不調緣恚怒食少腹中常痛楚四物乾姜並橘皮縮砂甘草為同侶婦人經候不調可用局方四物湯一貼加乾薑一塊用灰火炮甘草寸半微炙銼同四物湯烣粟二大盞入生薑三片煎取八分去滓服之如腹痛甚者加乾薑一塊如小錢大陳皮縮砂同煎服之第三十三證粟草加煎四物湯更兼香附與乾薑月經若要調勻好減半川芎與地黃婦人月候頗多如崩狀者用局方四物湯一貼炒香附子三錢灰火微炮乾薑一塊甘草一寸粟米百餘粒水三大盞煎取一盞半去滓分為二次空心食前服之第三十四證月經已過不曾通四物湯中減半芎蓬朮乾薑仍添入連煎數服有神功婦人經月不通皆因寒搏於內宜服局方四物湯加蓬朮一塊銼碎乾薑一塊灰火微炮銼如室女退半乾姜婦人全用水二盞生薑三片同煎取八分去滓空心食前溫服第三十五證婦人冷病沒人知面色痿黃力漸微牡蠣乾薑並芡殼同和龍骨赤石脂婦人冷病乃是赤白帶下也一方用赤石脂二兩火煅牡蠣一兩火煅乾薑一兩灰火微炮龍骨一兩雞頭殼一兩如無雞頭殼以雞頭代之上件五味併為細末酒糊為丸如梧桐子大每服五十丸用艾醋湯送下食前服第三十六證乍寒乍熱漸成癆膈噎胸迷食不消樂令建中加草果連進數服自和調虛勞寒熱之病皆因形體虧虛血氣不足可用局方樂令建中湯二貼草果二個大者灰炭微炮銼碎用水三大盞生薑十片烏梅北棗各三個同煎取一盞半去滓分作二次服之第三十七證病後傷脾胸膈滿老人強食氣虛短雖然可食又噁心草果頻加五積散病後傷動脾經致令胸滿氣短每用局方五膈寬中散二貼草果二個灰火炮銼用水一中碗生薑十片同煎取半碗去渣分作三四次服之第三十八證或寒或熱定無准體倦身疼渴思飲半夏門冬果與柴加煎四物能安寢寒熱之病最難治療但用四物湯二貼加柴胡去蘆頭橘皮半夏麥門冬去心草果各一錢用水三大盞生薑十五片烏梅北棗各二個同煎取一盞半去滓分作二服留滓再煎服第三十九證脾冷不磨停水穀腹痛膈滿脹心胸但將五膈煎三服可下尋常小理中脾臟主磨於水谷令脾氣虛弱飲食停滯胸膈痞滿可煎局方五膈寬中散二貼作二服送下小理中丸半貼其效甚速第四十證口乾心躁小便急邪熱攻人要水吃姜梅芍藥與門冬冷點五苓其病釋邪熱攻心令人小便赤渴欲飲引可用局方五苓散加白芍藥三寸三段銼碎用麥門冬五十粒去心水三盞生薑五片烏梅一個煎取一盞半去渣作三服每用五分盞調五苓散半服留滓再煎服第四十一證身疼體倦感寒邪口渴頭暈熱更加面赤藿香和解散仍添赤芍病須瘥感寒發熱頭疼體痛者可用局方和解正氣各半貼赤芍藥三段二寸長以水三盞入生薑五片烏梅二個煎取一盞半去渣一服二次如頭痛甚者臨時入江茶少許在藥內合勻服之第四十二證感風頭痛體昏沉寒熱痠疼力不禁一塊茯苓加五積茶姜燈草黑梅煎風寒傷於形體令人頭目不爽寒熱俱發百處痠疼可用局方五積散一貼赤茯苓一塊如錢大捶碎生薑十大片水一盞半煎至八分去滓溫服頭疼甚者臨時入江茶少許服之或小便赤加燈心十一莖烏梅二個煎服第四十三證脾腎俱虛冷氣奔衝心絞痛體無溫更兼下部都穿注青木香丸智散吞脾腎虛而心腹疼甚者可煎局方益智散一貼水二盞生薑五片入鹽少許同煎取八分去滓食前送下局方青木香丸四十粒連進二服第四十四證肉桂乾薑同蓽茇良薑四味研為丸腹疼冷泄能收效和劑方名大已寒大治男子婦人腹肚冷疼泄瀉不已者用局方續已寒丸一貼依法服餌果見神效第四十五證氣弱脾虛嘔且吐才吞粥藥難留住胡椒雞舌送靈砂縱使胃翻無憂懼往往脾虛胃冷嘔吐不止諸藥不效者用胡椒五十粒雞舌香十粒如無雞舌香以母丁香代之二味併為細末白湯半盞浸藥送靈砂數粒立便愈第四十六證暑中妙劑孰為宜官局方中有縮脾甘草乾姜加草果烏梅煎冷服何疑切詳暑月之際天氣炎隆暑邪侵犯宜用局方縮脾飲三貼加乾薑三塊如小錢大灰火炮甘草三寸微炙水二碗生薑二十片同煎取大碗去滓分為五六次隨意冷熱用果有奇效第四十七證血海崩來是幾年諸般調治不能痊炒香附子燒連殼總下震靈一十丸往往婦人血崩不止以香附子二兩炒令赤色連殼五個燒灰存性二味併為細末每服三錢陳飯飲湯調送局方震靈丹十丸重者三五服第四十八證人參荊芥入門冬半夏乾薑亦有功能療婦人寒熱病更除痰嗽快心胸婦人寒熱多因經候不調所致也可用局方荊芥散一貼加乾薑一塊如小錢大灰火炮麥門冬二十粒去心半夏曲一塊如錢大用水三盞生薑十片烏梅一個同煎取一盞半去滓分作二次服之留滓再煎婦人有孕不宜服之第四十九證氣閉能令血不通那堪寒熱遍身中柴胡蓬朮兼甘草四物同煎立有功大凡室女血閉不通或寒或熱者用四物湯二貼蓬朮一塊如小錢大柴胡去蘆頭一錢甘草三寸炙用水三盞生薑五片同煎取一盞半分二次食前服之第五十證胞胎忽動是勞傷或痛或疼用早防但取局方膠艾服更加烏藥與乾薑婦人胎動不安皆因胞絡勞傷宜服局方膠艾湯一貼乾薑二塊如小錢大烏藥一塊如錢大並銼為飲以水二盞生薑十片煎至八分去滓食前服之如身熱體痛更加當歸半錢速效第五十一證小兒瘡疹最難醫紅潤分明不必疑若見數枚黑點子酒煎紫草灌孩兒小兒瘡疹發時根紅活者為妙如發時間有黑點者乃邪毒歸內也可用紫草茸三二錢醇酒半盞煎至三分可濾去滓灌入兒口待發出為妙第五十二證久吐嬰兒不易醫多因痰嗽及傷脾但加十粒丁香子半夏湯中煮橘皮往往小兒最不可吐如有吐者每用局方橘皮半夏湯一貼加丁香十粒槌碎生薑七片甘草一寸半微炙水二盞煎取八分去滓令乳母食後服之次留一小蛤殼藥令兒作五次服或調青州白丸子一二粒或調局方來復丹一二粒更量兒大小加減服之第五十三證面黃童子身常熱多是乳娘食不節常宜降氣及烏沉免得嬰童生病孽切詳小兒之病多是乳母百日周歲內欲心太熾酒肉亂食或喜怒憂鬱皆從脈而行致小兒不能轉化乳母宜服局方烏沉湯降氣調勻乳脈致小兒異日無病也第五十四證小兒冷熱成泄痢乳食不消何曾睡縮砂粟米送香連更有橘皮方可意小兒泄痢可於局方中小兒香連丸二十粒至二五十粒量兒大小用縮砂十粒搗碎粟米約二百餘粒橘皮三片銼碎水二盞生薑五片北棗二個同煎至一盞分為數服送下局方香連丸度長幼服第五十五證虛熱攻人口發瘡舌間腐爛滿涎囊江茶細末同甘草摻入瘡瘍清且良口瘡之候因服熱過度或虛熱上攻滿口生瘡疼痛不已方用江茶末甘草末等分和勻摻入口中又方更加好礬入內尤佳奇效如神第五十六證熱毒多因酒麴傷咽喉腫痛口生瘡白梅須把江茶和噙化多番便復常往往咽喉口瘡非是小病但用白梅數個去核以江茶末和為丸如圓眼大每服一丸食後含化服第五十七證連夜不眠病宿眼見燈強視眶淫爛但將湯浸當歸洗血氣調和無此患往往連旬不睡強視燈燭目損光明眼眶赤爛蓋目者五臟六腑之精華一身之珍寶若用服藥多令目昏者十有八九今按道藏經云當歸活血今用當歸一寸泡湯洗眼奇效甚妙先洗去土用之第五十八證盜汗多因心體虛防風牡蠣術耆麩同煎薑棗調香散補助身心樂有餘盜汗之候皆因心神不足形體虧虛可服局方妙香散一貼分作二服煎防風牡蠣白朮黃耆各二錢麩皮炒用黃色水二盞生薑五片棗三枚同煎至一盞半去渣分二次調妙香散為佳第五十九證臟寒膨脹是脾虛丁木檳榔等分拘卜子牽牛同研末丸如梧子病能除腹脹之病皆由脾胃虛寒其證面目虛浮時時腹脹者是也可用楊氏家藏方消脹丸內用木香檳榔黑牽牛蘿蔔子加丁香五粒等分滴水為丸每服十五丸煎紫蘇湯送下食前服之第六十證腿痛腰疼屬老人骨寒髓冷最難禁鹿茸炮附棠梂子為飲為丸病自輕老人腰痛皆因陽氣衰弱腎臟虛寒之所致用鹿茸半兩塗酥炙附子炮烈去皮臍一隻棠梂子名山果子五十粒並銼碎每服三錢水二大盞生薑十片煎取八分去滓溫服如作丸子併為細末用薑汁糊為丸如梧桐子大每服三十丸溫酒鹽湯送下甚有奇功第六十一證不伏水土忽寒熱似瘧不似證難決姜調蘇合少黃丹連進數盞精神悅不伏水土者皆因脾胃虛弱觸冒寒邪致令寒熱發作如瘧狀用薑汁一蛤殼調黃丹半錢更用周方麝香蘇合香丸三粒用白湯浸服之必獲愈矣第六十二證鼻衄從來最損人皆因熱毒蘊心經蒲黃青黛勻平稱水和為膏貼耳邊鼻衄之候皆因熱毒蘊積心經不能已者宜用蒲黃青黛各半兩水調成膏子貼耳後立愈第六十三證鼻衄無時整桶流祈神問卜遍哀求但用南康真蛤粉半塗半服便無憂鼻衄發作整桶流出不能自已但用南康真蛤粉二兩為細末冷白湯調下用少許塗入鼻中立效第六十四證多年鼻衄不曾休涼藥無功熱藥投養正神丹同黑錫更兼三里艾丸燒鼻衄之病久不得已但取涼藥而不止者可用局方養正丹黑錫丹依法服更兼灸三里二十一壯第六十五證婦人室女血山崩冷熱未分何治決荊芥蓮蓬燒作灰湯調一劑偏奇絶婦人室女但崩中下血不論冷熱之病可用荊芥蓮蓬二味各等分燒為灰研為細末每服二大錢空心用米湯調服立應第六十六證急慢驚風有等差蛇頭蠍麝及辰砂防風滴乳蜈蚣炙更入星烏效特嘉小兒驚風多有等殊或急或慢或虛或實或吐或瀉以致生驚者但用花蛇頭一枚燒作灰用如無花蛇以烏蛇代之全蠍二錢麝香一字辰砂一大錢防風乳香各半錢赤腳蜈蚣一條用火炙南星一錢灰火炮川烏尖半錢生用上件併為細末水煮棗肉為丸如雞頭大陰乾每服一丸薄荷湯下第六十七證暑月炎蒸不可當嬰童發搐意慌忙抱龍丸子三五貼金銀薄荷煎作湯小兒發搐在於夏月皆因暑邪入心不能已者可於局方抱龍丸三五粒用金銀薄荷湯化下所有金銀薄荷者貓兒薄荷又有龍腦薄荷者是也第六十八證疳病尫羸是小兒保童丸內入蕪荑更兼苦楝並君子等得孩兒日漸肥小兒疳病令兒日漸羸瘦飲食不為肌膚可於局方內五疳保童丸五貼加蕪荑三大錢苦楝根三錢使君子三錢同保童丸為細末麵糊為丸如梧桐子大每服三十丸用米飲送下甚有功效第六十九證老人腎弱齒浮疼涼藥頻施不斷根肥皂藏鹽燒煅黑揩牙常用白如銀老人齒痛皆因腎氣虛弱或因常涼藥揩於牙根但用肥皂一枚去核入鹽在內用鐵線扎合以鹽泥固封於爐內火煅令黑研為細末每日於晨朝常用揩牙固齒定疼效如神第七十證牙齒浮疼腎氣虛每回發作不能除𤛑君黑錫排風送固齒牢牙痛卻祛牙齒浮疼者皆因血氣衰弱陽明脈虛用局方排風湯一貼水二盞入生薑三片煎至一盞去滓分作二服送下局方黑錫丹半貼其效有若神功矣第七十一證風熱攻衝眼目暗神方火煅石爐甘細末黃連同合和熱湯浸洗便為良夫眼者五臟六腑之精華一身之珍寶風熱攻衝令人眼目昏暗可用爐甘石二兩火燒一晝夜須是真者研令極細又用黃連二兩揀淨同為細末每用白湯浸藥洗眼更用青末搐鼻列之於後第七十二證目赤頭風疼且癢藿香晉礬各一兩朴硝香麝及螺青搐入鼻中痛必減頭風之病皆因風邪注於腦戶令人眼目昏疼羞明怕日或腫或癢每用晉礬藿香各一兩螺青朴硝各三錢同為細末入麝香半錢又研令勻每用少許搐入鼻中其效必減又方又良薑三錢甚妙第七十三證冷淚眸昏多腦寒先因涼藥損於肝每朝洗面湯揩捊豁眼勝將妙藥餐老人目昏者皆因先用涼藥過度損於肝經以致眼目昏暗腦冷寒淚可於每日洗面之水先用湯豁眼自然明亮此法勝如服藥更難盡述第七十四證口瘡發熱腫連喉百法醫之病不瘳爛細自然蘿蔔汁吐涎頻漱病難留咽喉口瘡之病皆因熱邪熏於上焦腫痛不止但用蘿蔔研爛細汁頻嗽吐涎用之甚妙第七十五證五痔皆因腸癖生忽然疼痛不能行全蠍三枚燒香餅煙燻患處必去根痔疾之病皆因腸間癖結其證有五若有斯證但用全蠍三個香餅一個桶一個先盛灰一半後燒香餅紅井全蠍入在內燒煙燻痔此方百發百中其效果然頗異第七十六證金瘡出血湧如泉龍骨黃連功未全一味紫蘇為細末用時封扎自安痊金瘡出血有如湧泉不能止者但用多年陳紫蘇為末在患處後用帕兒封扎為妙第七十七證風寒冷凍損皮間腳裂開皸步履難五倍為末加牛髓萬人傳了萬人安腳裂之患因風寒吹裂皮膚用五倍子半兩為末牛骨髓調成膏子傅患處立愈如無牛髓往做梳兒處回買為妙
